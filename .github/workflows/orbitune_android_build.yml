name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Test and Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze project source
        run: flutter analyze
      - name: Run tests
        run: flutter test

  build-debug:
    name: Build Debug APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Build Debug APK
        run: flutter build apk --debug --split-per-abi
      - name: Upload Android Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbitune-android-debug-apks
          path: build/app/outputs/flutter-apk/*-debug.apk

  build-release:
    name: Build Release APK
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          $keystoreBytes = [System.Convert]::FromBase64String($env:KEYSTORE_BASE64)
          [System.IO.File]::WriteAllBytes("android/upload-keystore.jks", $keystoreBytes)
        shell: pwsh
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
        shell: bash
      - name: Build Release APK
        run: flutter build apk --release --split-per-abi
      - name: Upload Android Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbitune-android-release-apks
          path: build/app/outputs/flutter-apk/*-release.apk
